<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renderweekup — Ping Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c0a; --card: #111411; --border: #1e221e;
      --fg: #e8ede8; --muted: #5a6a5a; --green: #39d353;
      --red: #f44; --yellow: #f5a623;
      --font: 'JetBrains Mono', 'Fira Mono', 'Consolas', monospace;
    }
    body { background: var(--bg); color: var(--fg); font-family: var(--font); min-height: 100vh; padding: 2rem; }

    /* Header */
    header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .title { display: flex; align-items: center; gap: 0.75rem; font-size: 1.5rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .subtitle { color: var(--muted); font-size: 0.75rem; margin-top: 0.4rem; }
    .next-ping { text-align: right; }
    .next-ping label { display: block; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.25rem; }
    .countdown { font-size: 1.4rem; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 1rem; margin-bottom: 2.5rem; }
    .stat-card { background: var(--card); border: 1px solid var(--border); padding: 1.25rem; }
    .stat-card label { display: block; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
    .stat-card .val { font-size: 2rem; font-weight: 700; }
    .val.green { color: var(--green); }
    .val.red { color: var(--red); }

    /* Section */
    .section { margin-bottom: 2.5rem; }
    .section-header { display: flex; align-items: center; gap: 0.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; margin-bottom: 1rem; }
    .method-badge { font-size: 0.65rem; font-weight: 700; padding: 0.2rem 0.5rem; border: 1px solid; letter-spacing: 0.08em; }
    .method-badge.get { color: var(--green); border-color: #39d35340; }
    .method-badge.post { color: var(--yellow); border-color: #f5a62340; }
    .section-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; }
    .section-count { color: var(--muted); font-size: 0.8rem; }

    /* Target card */
    .target-card { background: var(--card); border: 1px solid var(--border); margin-bottom: 0.75rem; }
    .target-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; padding: 1rem; cursor: pointer; }
    .target-row:hover { background: #151815; }
    .target-info { display: flex; align-items: flex-start; gap: 0.75rem; min-width: 0; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .status-dot.ok { background: var(--green); }
    .status-dot.fail { background: var(--red); }
    .status-dot.idle { background: var(--muted); }
    .target-url { font-size: 0.8rem; font-weight: 700; word-break: break-all; }
    .target-meta { display: flex; flex-wrap: wrap; gap: 0.5rem 1rem; margin-top: 0.35rem; font-size: 0.7rem; color: var(--muted); }
    .target-meta .ok { color: var(--green); font-weight: 700; }
    .target-meta .fail { color: var(--red); }
    .target-meta .latency-good { color: var(--green); }
    .target-meta .latency-warn { color: var(--yellow); }
    .target-meta .latency-bad { color: var(--red); }
    .target-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .icon-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem; padding: 0.25rem; line-height: 1; }
    .icon-btn:hover { color: var(--fg); }
    .icon-btn.del:hover { color: var(--red); }

    /* Expanded body */
    .target-body { display: none; border-top: 1px solid var(--border); padding: 1rem; }
    .target-body.open { display: block; }
    .mini-chart { background: #0d0f0d; border: 1px solid var(--border); padding: 0.75rem; margin-bottom: 1rem; position: relative; }
    canvas.chart { width: 100%; height: 90px; display: block; }
    .chart-avg { font-size: 0.65rem; color: var(--muted); text-align: right; margin-top: 0.4rem; }
    .feed { max-height: 220px; overflow-y: auto; }
    .feed-row { display: flex; justify-content: space-between; align-items: center; gap: 1rem; padding: 0.5rem 0; border-bottom: 1px solid #1e221e40; font-size: 0.7rem; }
    .feed-left { display: flex; align-items: center; gap: 0.5rem; }
    .feed-ind { width: 4px; height: 20px; flex-shrink: 0; }
    .status-code { font-weight: 700; }
    .ts { color: var(--muted); margin-top: 0.15rem; }
    .feed-right { text-align: right; }
    .resp-body { background: #0d0f0d; padding: 0.2rem 0.4rem; font-size: 0.65rem; color: var(--muted); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 0.2rem; }
    .empty { color: var(--muted); font-size: 0.75rem; padding: 1rem 0; text-align: center; }

    /* Add form */
    .add-btn { width: 100%; border: 1px dashed var(--border); background: none; color: var(--muted); cursor: pointer; padding: 0.6rem; font-family: var(--font); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .add-btn:hover { color: var(--fg); border-color: #3a3a3a; }
    .add-form { background: var(--card); border: 1px solid var(--border); padding: 1rem; margin-top: 0.5rem; display: none; }
    .add-form.open { display: block; }
    .form-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.75rem; font-weight: 700; }
    input, textarea { width: 100%; background: #0d0f0d; border: 1px solid var(--border); color: var(--fg); font-family: var(--font); font-size: 0.75rem; padding: 0.5rem 0.75rem; margin-bottom: 0.5rem; outline: none; }
    input:focus, textarea:focus { border-color: var(--green); }
    textarea { resize: none; height: 70px; }
    .form-actions { display: flex; gap: 0.5rem; }
    .btn { background: var(--green); color: #000; border: none; cursor: pointer; font-family: var(--font); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; padding: 0.5rem 1rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.ghost { background: none; color: var(--muted); border: 1px solid var(--border); }
    .btn.ghost:hover { color: var(--fg); }
  </style>
</head>
<body>

<header>
  <div>
    <div class="title"><span class="dot"></span>Renderweekup</div>
    <div class="subtitle" id="subtitle">Loading...</div>
  </div>
  <div class="next-ping">
    <label>Next Ping In</label>
    <div class="countdown" id="countdown">--:--</div>
  </div>
</header>

<div class="stats">
  <div class="stat-card"><label>Uptime</label><div class="val green" id="uptime">0.00%</div></div>
  <div class="stat-card"><label>Total Pings</label><div class="val" id="total">0</div></div>
  <div class="stat-card"><label>Success</label><div class="val green" id="success">0</div></div>
  <div class="stat-card"><label>Failures</label><div class="val red" id="failures">0</div></div>
</div>

<div class="section">
  <div class="section-header">
    <span class="method-badge get">GET</span>
    <span class="section-title">Requests</span>
    <span class="section-count" id="get-count">(0)</span>
  </div>
  <div id="get-list"></div>
  <button class="add-btn" id="get-add-btn">+ Add GET Request</button>
  <div class="add-form" id="get-form">
    <div class="form-title">New GET Target</div>
    <input type="text" id="get-url" placeholder="https://example.com/api/health" />
    <div class="form-actions">
      <button class="btn" id="get-submit">Add</button>
      <button class="btn ghost" id="get-cancel">Cancel</button>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-header">
    <span class="method-badge post">POST</span>
    <span class="section-title">Requests</span>
    <span class="section-count" id="post-count">(0)</span>
  </div>
  <div id="post-list"></div>
  <button class="add-btn" id="post-add-btn">+ Add POST Request</button>
  <div class="add-form" id="post-form">
    <div class="form-title">New POST Target</div>
    <input type="text" id="post-url" placeholder="https://example.com/api/endpoint" />
    <textarea id="post-body" placeholder='{"key": "value"} — optional request body'></textarea>
    <div class="form-actions">
      <button class="btn" id="post-submit">Add</button>
      <button class="btn ghost" id="post-cancel">Cancel</button>
    </div>
  </div>
</div>

<script>
let intervalMs = 120000;
let nextPingTime = null;
let allTargets = [];

// ── Countdown ──────────────────────────────────────────────────────────────
function updateCountdown() {
  const el = document.getElementById('countdown');
  const now = Date.now();
  const ms = intervalMs - (now % intervalMs);
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
setInterval(updateCountdown, 1000);
updateCountdown();

// ── Helpers ────────────────────────────────────────────────────────────────
function timeAgo(ts) {
  const s = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  return `${Math.floor(s/3600)}h ago`;
}
function latencyClass(ms) {
  return ms > 1000 ? 'latency-bad' : ms > 500 ? 'latency-warn' : 'latency-good';
}

// ── Mini chart ─────────────────────────────────────────────────────────────
function drawChart(canvas, records) {
  const data = [...records].reverse();
  const W = canvas.offsetWidth || 600;
  const H = 90;
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  if (data.length < 2) {
    ctx.fillStyle = '#5a6a5a';
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Waiting for more pings...', W / 2, H / 2);
    return;
  }

  const pad = { top: 8, bottom: 20, left: 44, right: 8 };
  const w = W - pad.left - pad.right;
  const h = H - pad.top - pad.bottom;
  const max = Math.max(...data.map(d => d.elapsedMs), 100);
  const avg = data.reduce((s, d) => s + d.elapsedMs, 0) / data.length;

  const toX = (i) => pad.left + (i / (data.length - 1)) * w;
  const toY = (v) => pad.top + h - (v / max) * h;

  // Grid
  ctx.strokeStyle = '#1e221e'; ctx.lineWidth = 1;
  [0, 0.5, 1].forEach(t => {
    const y = pad.top + h * (1 - t);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + w, y); ctx.stroke();
    ctx.fillStyle = '#5a6a5a'; ctx.font = '9px monospace'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(max * t) + 'ms', pad.left - 4, y + 3);
  });

  // X labels
  const step = Math.max(1, Math.floor(data.length / 5));
  data.forEach((d, i) => {
    if (i % step !== 0 && i !== data.length - 1) return;
    const t = new Date(d.timestamp);
    ctx.fillStyle = '#5a6a5a'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
    ctx.fillText(`${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`, toX(i), H - 3);
  });

  // Area
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + h);
  grad.addColorStop(0, 'rgba(57,211,83,0.25)');
  grad.addColorStop(1, 'rgba(57,211,83,0)');
  ctx.beginPath();
  ctx.moveTo(toX(0), toY(data[0].elapsedMs));
  data.forEach((d, i) => ctx.lineTo(toX(i), toY(d.elapsedMs)));
  ctx.lineTo(toX(data.length - 1), pad.top + h);
  ctx.lineTo(toX(0), pad.top + h);
  ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  // Line
  ctx.beginPath(); ctx.strokeStyle = '#39d353'; ctx.lineWidth = 1.5;
  data.forEach((d, i) => i === 0 ? ctx.moveTo(toX(i), toY(d.elapsedMs)) : ctx.lineTo(toX(i), toY(d.elapsedMs)));
  ctx.stroke();

  // Avg line
  ctx.beginPath(); ctx.setLineDash([4, 4]); ctx.strokeStyle = '#5a6a5a'; ctx.lineWidth = 1;
  ctx.moveTo(pad.left, toY(avg)); ctx.lineTo(pad.left + w, toY(avg)); ctx.stroke();
  ctx.setLineDash([]);

  // Dots
  data.forEach((d, i) => {
    ctx.beginPath(); ctx.arc(toX(i), toY(d.elapsedMs), 3, 0, Math.PI * 2);
    ctx.fillStyle = d.success ? '#39d353' : '#f44';
    ctx.strokeStyle = '#0a0c0a'; ctx.lineWidth = 1.5;
    ctx.fill(); ctx.stroke();
  });

  // Avg badge
  const avgEl = canvas.parentElement.querySelector('.chart-avg');
  if (avgEl) {
    const col = avg > 1000 ? '#f44' : avg > 500 ? '#f5a623' : '#39d353';
    avgEl.innerHTML = `avg <span style="color:${col};font-weight:700">${Math.round(avg)}ms</span>`;
  }
}

// ── Render feed ────────────────────────────────────────────────────────────
function renderFeed(container, records) {
  if (!records.length) {
    container.innerHTML = '<div class="empty">No pings yet</div>';
    return;
  }
  container.innerHTML = records.map(r => {
    const lc = latencyClass(r.elapsedMs);
    return `
      <div class="feed-row">
        <div class="feed-left">
          <div class="feed-ind" style="background:${r.success ? 'var(--green)' : 'var(--red)'}"></div>
          <div>
            <div class="status-code">${r.status ? 'HTTP ' + r.status : 'ERR'}</div>
            <div class="ts">${new Date(r.timestamp).toLocaleTimeString()} · ${timeAgo(r.timestamp)}</div>
          </div>
        </div>
        <div class="feed-right">
          <div class="${lc}">${r.elapsedMs}ms</div>
          ${r.responseBody ? `<div class="resp-body" title="${r.responseBody}">${r.responseBody}</div>` : ''}
          ${r.error ? `<div style="color:var(--red);font-size:0.65rem;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.error}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

// ── Render target card ─────────────────────────────────────────────────────
function renderTargetCard(th) {
  const { target, records, totalPings, successCount, failureCount } = th;
  const last = records[0];
  const uptime = totalPings ? ((successCount / totalPings) * 100).toFixed(1) : '0.0';
  const dotClass = last ? (last.success ? 'ok' : 'fail') : 'idle';
  const lastLatency = last ? `<span class="${latencyClass(last.elapsedMs)}">last ${last.elapsedMs}ms</span>` : '';

  const card = document.createElement('div');
  card.className = 'target-card';
  card.dataset.id = target.id;
  card.innerHTML = `
    <div class="target-row">
      <div class="target-info">
        <div class="status-dot ${dotClass}"></div>
        <div>
          <div class="target-url">${target.url}</div>
          ${target.body ? `<div style="font-size:0.65rem;color:var(--muted);margin-top:0.2rem;word-break:break-all">body: ${target.body}</div>` : ''}
          <div class="target-meta">
            <span class="ok">${uptime}% up</span>
            <span>${successCount} ok</span>
            <span class="fail">${failureCount} fail</span>
            <span>${totalPings} total</span>
            ${lastLatency}
          </div>
        </div>
      </div>
      <div class="target-actions">
        <button class="icon-btn toggle-btn" title="Expand">▾</button>
        ${target.id !== 'default' ? `<button class="icon-btn del" data-id="${target.id}" title="Delete">✕</button>` : ''}
      </div>
    </div>
    <div class="target-body">
      <div class="mini-chart">
        <canvas class="chart"></canvas>
        <div class="chart-avg"></div>
      </div>
      <div class="feed"></div>
    </div>`;

  // Toggle expand
  const row = card.querySelector('.target-row');
  const body = card.querySelector('.target-body');
  const toggleBtn = card.querySelector('.toggle-btn');
  row.addEventListener('click', (e) => {
    if (e.target.classList.contains('del')) return;
    body.classList.toggle('open');
    toggleBtn.textContent = body.classList.contains('open') ? '▴' : '▾';
    if (body.classList.contains('open')) {
      const canvas = card.querySelector('canvas');
      drawChart(canvas, records);
      renderFeed(card.querySelector('.feed'), records);
    }
  });

  // Delete
  const delBtn = card.querySelector('.del');
  if (delBtn) {
    delBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm('Remove this target?')) return;
      await fetch(`/api/targets/${target.id}`, { method: 'DELETE' });
      loadData();
    });
  }

  return card;
}

// ── Render sections ────────────────────────────────────────────────────────
function renderSection(listId, countId, targets) {
  const list = document.getElementById(listId);
  const countEl = document.getElementById(countId);
  countEl.textContent = `(${targets.length})`;
  list.innerHTML = '';
  targets.forEach(th => list.appendChild(renderTargetCard(th)));
}

// ── Load data ──────────────────────────────────────────────────────────────
async function loadData() {
  const res = await fetch('/api/ping-history');
  const data = await res.json();
  allTargets = data.targets || [];
  intervalMs = data.intervalMs;

  // Aggregate stats
  const totalPings = allTargets.reduce((s, t) => s + t.totalPings, 0);
  const successCount = allTargets.reduce((s, t) => s + t.successCount, 0);
  const failureCount = allTargets.reduce((s, t) => s + t.failureCount, 0);
  const uptime = totalPings ? ((successCount / totalPings) * 100).toFixed(2) : '0.00';

  document.getElementById('subtitle').textContent = `Pinging ${allTargets.length} target${allTargets.length !== 1 ? 's' : ''} every 2 minutes`;
  document.getElementById('uptime').textContent = uptime + '%';
  document.getElementById('total').textContent = totalPings;
  document.getElementById('success').textContent = successCount;
  document.getElementById('failures').textContent = failureCount;

  const gets = allTargets.filter(t => t.target.method === 'GET');
  const posts = allTargets.filter(t => t.target.method === 'POST');
  renderSection('get-list', 'get-count', gets);
  renderSection('post-list', 'post-count', posts);
}

loadData();
setInterval(loadData, 5000);

// ── Add target forms ───────────────────────────────────────────────────────
function setupForm(addBtnId, formId, cancelId, submitId, method) {
  const addBtn = document.getElementById(addBtnId);
  const form = document.getElementById(formId);
  const cancelBtn = document.getElementById(cancelId);
  const submitBtn = document.getElementById(submitId);

  addBtn.addEventListener('click', () => { form.classList.add('open'); addBtn.style.display = 'none'; });
  cancelBtn.addEventListener('click', () => { form.classList.remove('open'); addBtn.style.display = ''; });
  submitBtn.addEventListener('click', async () => {
    const url = document.getElementById(`${method.toLowerCase()}-url`).value.trim();
    if (!url) return;
    const bodyEl = document.getElementById(`${method.toLowerCase()}-body`);
    const body = bodyEl ? bodyEl.value.trim() || null : null;
    submitBtn.disabled = true; submitBtn.textContent = 'Adding...';
    await fetch('/api/targets', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, method, body }),
    });
    document.getElementById(`${method.toLowerCase()}-url`).value = '';
    if (bodyEl) bodyEl.value = '';
    form.classList.remove('open');
    addBtn.style.display = '';
    submitBtn.disabled = false; submitBtn.textContent = 'Add';
    loadData();
  });
}

setupForm('get-add-btn', 'get-form', 'get-cancel', 'get-submit', 'GET');
setupForm('post-add-btn', 'post-form', 'post-cancel', 'post-submit', 'POST');
</script>
</body>
</html>
